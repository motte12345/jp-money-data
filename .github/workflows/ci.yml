name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Validate data (schema + slice invariants)
        run: npm run validate
      - name: Generate TS from JSON
        run: npm run generate
      - name: Typecheck
        run: npm -w jp-money-data run typecheck
      - name: Test (resolve / invariants / anchors)
        run: npm test
      - name: Build package
        run: npm -w jp-money-data run build
